name: Release Gate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to use for artifact naming (for example: v1.0.1)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-22.04
    env:
      CARGO_TARGET_DIR: /tmp/900invoice-target
      GOVERNANCE_ARTIFACT_RETENTION_DAYS: ${{ vars.GOVERNANCE_ARTIFACT_RETENTION_DAYS || '30' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.tag || '' }}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Verify repository policy (strict)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GOVERNANCE_PROFILE: ${{ vars.GOVERNANCE_PROFILE || 'solo' }}
          REQUIRED_APPROVING_REVIEW_COUNT: ${{ vars.REQUIRED_APPROVING_REVIEW_COUNT || '' }}
          REQUIRE_CODE_OWNER_REVIEWS: ${{ vars.REQUIRE_CODE_OWNER_REVIEWS || '' }}
          REQUIRE_LAST_PUSH_APPROVAL: ${{ vars.REQUIRE_LAST_PUSH_APPROVAL || '' }}
        run: |
          if [[ -z "${REQUIRED_APPROVING_REVIEW_COUNT}" ]]; then
            unset REQUIRED_APPROVING_REVIEW_COUNT
          fi
          if [[ -z "${REQUIRE_CODE_OWNER_REVIEWS}" ]]; then
            unset REQUIRE_CODE_OWNER_REVIEWS
          fi
          if [[ -z "${REQUIRE_LAST_PUSH_APPROVAL}" ]]; then
            unset REQUIRE_LAST_PUSH_APPROVAL
          fi
          ./scripts/verify-repo-policy.sh 900Labs/900Invoice main

      - name: Verify API docs parity
        run: ./scripts/verify-api-doc-commands.sh

      - name: Resolve governance checklist diff base
        id: gov_base
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            git fetch --tags --force
            current_tag="${GITHUB_REF_NAME}"
            previous_tag="$(git tag --sort=-creatordate | grep -Fxv "${current_tag}" | head -n1 || true)"
            if [[ -n "${previous_tag}" ]]; then
              base_ref="${previous_tag}"
            else
              base_ref="$(git rev-list --max-parents=0 HEAD | tail -n1)"
            fi
          else
            git fetch --no-tags origin main
            base_ref="origin/main"
          fi
          echo "base_ref=${base_ref}" >> "$GITHUB_OUTPUT"
          echo "Governance checklist diff base: ${base_ref}"

      - name: Verify governance sprint checklist reference
        id: gov_check
        shell: bash
        env:
          STRICT_SPRINT_DOC_REFERENCE: ${{ vars.STRICT_SPRINT_DOC_REFERENCE || '0' }}
        run: |
          mkdir -p .tmp
          REPORT_PATH=".tmp/release-governance-diff-context.txt" \
          REPORT_JSON_PATH=".tmp/release-governance-diff-context.json" \
            ./scripts/verify-governance-sprint-checklist.sh "${{ steps.gov_base.outputs.base_ref }}" "HEAD"

      - name: Validate governance artifact retention policy
        shell: bash
        run: |
          if [[ ! "${GOVERNANCE_ARTIFACT_RETENTION_DAYS}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: GOVERNANCE_ARTIFACT_RETENTION_DAYS must be an integer." >&2
            exit 1
          fi
          if (( GOVERNANCE_ARTIFACT_RETENTION_DAYS < 1 || GOVERNANCE_ARTIFACT_RETENTION_DAYS > 90 )); then
            echo "ERROR: GOVERNANCE_ARTIFACT_RETENTION_DAYS must be between 1 and 90." >&2
            exit 1
          fi
          echo "Governance artifact retention days: ${GOVERNANCE_ARTIFACT_RETENTION_DAYS}"

      - name: Validate governance trace JSON schema
        run: ./scripts/verify-governance-trace-json.sh .tmp/release-governance-diff-context.json

      - name: Publish governance diff trace summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Release Governance Diff Trace"
            echo ""
            echo "- Diff base: \`${{ steps.gov_base.outputs.base_ref }}\`"
            echo "- Head: \`HEAD\`"
            echo "- Enforcement outcome: \`${{ steps.gov_check.outcome }}\`"
            echo ""
            echo "### Context"
            echo ""
            if [[ -f ".tmp/release-governance-diff-context.txt" ]]; then
              echo '```text'
              cat .tmp/release-governance-diff-context.txt
              echo '```'
            else
              echo "_No governance diff context file was generated._"
            fi
            echo ""
            echo "JSON trace file: \`.tmp/release-governance-diff-context.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload governance diff context artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-governance-diff-context-${{ steps.meta.outputs.tag }}
          retention-days: ${{ env.GOVERNANCE_ARTIFACT_RETENTION_DAYS }}
          path: |
            .tmp/release-governance-diff-context.txt
            .tmp/release-governance-diff-context.json
          if-no-files-found: warn

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libappindicator3-dev

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-directories: /tmp/900invoice-target

      - name: Install npm dependencies
        run: npm install

      - name: Frontend type check
        run: npm run check

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Cargo clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build source release bundle
        shell: bash
        run: |
          out="900invoice-${{ steps.meta.outputs.version }}-src.tar.gz"
          git archive --format=tar.gz --prefix="900invoice-${{ steps.meta.outputs.version }}/" -o "${out}" HEAD
          shasum -a 256 "${out}" > SHA256SUMS.txt

      - name: Upload release-gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-${{ steps.meta.outputs.tag }}
          path: |
            900invoice-${{ steps.meta.outputs.version }}-src.tar.gz
            SHA256SUMS.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: 900Invoice ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            900invoice-${{ steps.meta.outputs.version }}-src.tar.gz
            SHA256SUMS.txt
