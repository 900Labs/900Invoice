name: Release Gate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to use for artifact naming (for example: v1.0.1)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-22.04
    env:
      CARGO_TARGET_DIR: /tmp/900invoice-target
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.tag || '' }}" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Verify API docs parity
        run: ./scripts/verify-api-doc-commands.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libappindicator3-dev

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-directories: /tmp/900invoice-target

      - name: Install npm dependencies
        run: npm install

      - name: Frontend type check
        run: npm run check

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Cargo clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

      - name: Build source release bundle
        shell: bash
        run: |
          out="900invoice-${{ steps.meta.outputs.version }}-src.tar.gz"
          git archive --format=tar.gz --prefix="900invoice-${{ steps.meta.outputs.version }}/" -o "${out}" HEAD
          shasum -a 256 "${out}" > SHA256SUMS.txt

      - name: Upload release-gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-${{ steps.meta.outputs.tag }}
          path: |
            900invoice-${{ steps.meta.outputs.version }}-src.tar.gz
            SHA256SUMS.txt

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: 900Invoice ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            900invoice-${{ steps.meta.outputs.version }}-src.tar.gz
            SHA256SUMS.txt
