name: Governance Audit

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      governance_profile:
        description: "Governance profile: solo, small-team, enterprise"
        required: false
        default: "solo"
        type: string
      required_approving_review_count:
        description: "Optional override for required_approving_review_count"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance-audit:
    name: Governance Audit
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      GOVERNANCE_ARTIFACT_RETENTION_DAYS: ${{ vars.GOVERNANCE_ARTIFACT_RETENTION_DAYS || '30' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve governance profile inputs
        id: resolve_profile
        shell: bash
        env:
          GOVERNANCE_PROFILE_INPUT: ${{ github.event.inputs.governance_profile || '' }}
          DEFAULT_GOVERNANCE_PROFILE: ${{ vars.GOVERNANCE_PROFILE || 'solo' }}
          REVIEW_COUNT_OVERRIDE: ${{ github.event.inputs.required_approving_review_count || '' }}
          CODE_OWNER_OVERRIDE: ${{ vars.REQUIRE_CODE_OWNER_REVIEWS || '' }}
          LAST_PUSH_OVERRIDE: ${{ vars.REQUIRE_LAST_PUSH_APPROVAL || '' }}
        run: |
          if [[ -n "${GOVERNANCE_PROFILE_INPUT}" ]]; then
            export GOVERNANCE_PROFILE="${GOVERNANCE_PROFILE_INPUT}"
          else
            export GOVERNANCE_PROFILE="${DEFAULT_GOVERNANCE_PROFILE}"
          fi

          if [[ -n "${REVIEW_COUNT_OVERRIDE}" ]]; then
            export REQUIRED_APPROVING_REVIEW_COUNT="${REVIEW_COUNT_OVERRIDE}"
          else
            unset REQUIRED_APPROVING_REVIEW_COUNT
          fi

          if [[ -n "${CODE_OWNER_OVERRIDE}" ]]; then
            export REQUIRE_CODE_OWNER_REVIEWS="${CODE_OWNER_OVERRIDE}"
          else
            unset REQUIRE_CODE_OWNER_REVIEWS
          fi

          if [[ -n "${LAST_PUSH_OVERRIDE}" ]]; then
            export REQUIRE_LAST_PUSH_APPROVAL="${LAST_PUSH_OVERRIDE}"
          else
            unset REQUIRE_LAST_PUSH_APPROVAL
          fi

          source ./scripts/governance-profile-env.sh
          governance_profile_resolve

          mkdir -p .tmp
          {
            echo "governance_profile=${GOVERNANCE_PROFILE}"
            echo "required_approving_review_count=${REQUIRED_APPROVING_REVIEW_COUNT}"
            echo "require_code_owner_reviews=${REQUIRE_CODE_OWNER_REVIEWS}"
            echo "require_last_push_approval=${REQUIRE_LAST_PUSH_APPROVAL}"
            echo "governance_profile_input=${GOVERNANCE_PROFILE_INPUT:-none}"
            echo "review_count_override_input=${REVIEW_COUNT_OVERRIDE:-none}"
            echo "code_owner_override_var=${CODE_OWNER_OVERRIDE:-none}"
            echo "last_push_override_var=${LAST_PUSH_OVERRIDE:-none}"
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > .tmp/governance-profile-assertion.txt

          echo "resolved_governance_profile=${GOVERNANCE_PROFILE}" >> "$GITHUB_OUTPUT"
          echo "resolved_required_approving_review_count=${REQUIRED_APPROVING_REVIEW_COUNT}" >> "$GITHUB_OUTPUT"
          echo "resolved_require_code_owner_reviews=${REQUIRE_CODE_OWNER_REVIEWS}" >> "$GITHUB_OUTPUT"
          echo "resolved_require_last_push_approval=${REQUIRE_LAST_PUSH_APPROVAL}" >> "$GITHUB_OUTPUT"

      - name: Verify repository policy (strict)
        id: policy_check
        shell: bash
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          GH_FALLBACK_TOKEN: ${{ github.token }}
          GOVERNANCE_PROFILE: ${{ steps.resolve_profile.outputs.resolved_governance_profile }}
          REQUIRED_APPROVING_REVIEW_COUNT: ${{ steps.resolve_profile.outputs.resolved_required_approving_review_count }}
          REQUIRE_CODE_OWNER_REVIEWS: ${{ steps.resolve_profile.outputs.resolved_require_code_owner_reviews }}
          REQUIRE_LAST_PUSH_APPROVAL: ${{ steps.resolve_profile.outputs.resolved_require_last_push_approval }}
          STRICT: "1"
        run: |
          export GH_TOKEN="${GH_ADMIN_TOKEN:-$GH_FALLBACK_TOKEN}"
          ./scripts/verify-repo-policy.sh 900Labs/900Invoice main

      - name: Verify API docs parity
        id: api_docs_check
        run: ./scripts/verify-api-doc-commands.sh

      - name: Validate governance artifact retention policy
        shell: bash
        run: |
          if [[ ! "${GOVERNANCE_ARTIFACT_RETENTION_DAYS}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: GOVERNANCE_ARTIFACT_RETENTION_DAYS must be an integer." >&2
            exit 1
          fi
          if (( GOVERNANCE_ARTIFACT_RETENTION_DAYS < 1 || GOVERNANCE_ARTIFACT_RETENTION_DAYS > 90 )); then
            echo "ERROR: GOVERNANCE_ARTIFACT_RETENTION_DAYS must be between 1 and 90." >&2
            exit 1
          fi
          echo "Governance artifact retention days: ${GOVERNANCE_ARTIFACT_RETENTION_DAYS}"

      - name: Upload governance profile assertion
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-profile-assertion-${{ github.run_id }}
          retention-days: ${{ env.GOVERNANCE_ARTIFACT_RETENTION_DAYS }}
          path: .tmp/governance-profile-assertion.txt
          if-no-files-found: error

      - name: Open or update governance incident issue
        id: incident_issue
        if: failure()
        uses: actions/github-script@v7
        env:
          POLICY_OUTCOME: ${{ steps.policy_check.outcome }}
          API_DOCS_OUTCOME: ${{ steps.api_docs_check.outcome }}
          EXPECTED_GOVERNANCE_PROFILE: ${{ steps.resolve_profile.outputs.resolved_governance_profile }}
          EXPECTED_REVIEW_COUNT_OVERRIDE: ${{ github.event.inputs.required_approving_review_count || '' }}
          EXPECTED_CODE_OWNER: ${{ steps.resolve_profile.outputs.resolved_require_code_owner_reviews }}
          EXPECTED_LAST_PUSH_APPROVAL: ${{ steps.resolve_profile.outputs.resolved_require_last_push_approval }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = ["governance-audit", "incident", "automation"];
            const issueTitle = "Governance audit failure: policy drift detected";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const branchProtectionDoc = `${context.serverUrl}/${owner}/${repo}/blob/${context.sha}/docs/BRANCH_PROTECTION.md`;
            const auditDoc = `${context.serverUrl}/${owner}/${repo}/blob/${context.sha}/docs/GOVERNANCE_AUDIT.md`;
            const timestamp = new Date().toISOString();

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: "B60205",
                  description: "Automated governance-audit incident tracking",
                });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            }

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: labels.join(","),
              per_page: 100,
            });

            const incidentBody = [
              "Automated governance audit detected a failure.",
              "",
              `- Time (UTC): ${timestamp}`,
              `- Workflow run: ${runUrl}`,
              `- Expected governance profile: ${process.env.EXPECTED_GOVERNANCE_PROFILE ?? "solo"}`,
              `- Required review override: ${process.env.EXPECTED_REVIEW_COUNT_OVERRIDE || "none"}`,
              `- Require code-owner reviews: ${process.env.EXPECTED_CODE_OWNER ?? "unknown"}`,
              `- Require last-push approval: ${process.env.EXPECTED_LAST_PUSH_APPROVAL ?? "unknown"}`,
              `- Policy check outcome: ${process.env.POLICY_OUTCOME ?? "unknown"}`,
              `- API docs parity outcome: ${process.env.API_DOCS_OUTCOME ?? "unknown"}`,
              "",
              "Next actions:",
              `1. Review the failed run logs: ${runUrl}`,
              "2. Compare live settings against documented policy.",
              `3. Re-apply policy if needed: \`./scripts/apply-repo-policy.sh ${owner}/${repo} main\``,
              `4. Re-run the workflow after remediation.`,
              "",
              `References: ${branchProtectionDoc} | ${auditDoc}`,
            ].join("\n");

            const existing = openIssues.find((issue) => issue.title === issueTitle);
            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: incidentBody,
              });
              core.setOutput("issue_number", String(existing.number));
              core.setOutput("issue_url", existing.html_url);
              core.setOutput("incident_action", "updated");
              core.info(`Updated existing governance incident issue #${existing.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title: issueTitle,
              body: incidentBody,
              labels,
            });
            core.setOutput("issue_number", String(created.data.number));
            core.setOutput("issue_url", created.data.html_url);
            core.setOutput("incident_action", "created");
            core.info(`Created governance incident issue #${created.data.number}`);

      - name: Notify external governance incident webhook (optional)
        if: failure() && steps.incident_issue.outcome == 'success'
        shell: bash
        env:
          GOVERNANCE_INCIDENT_WEBHOOK_URL: ${{ secrets.GOVERNANCE_INCIDENT_WEBHOOK_URL }}
          GOVERNANCE_INCIDENT_WEBHOOK_TOKEN: ${{ secrets.GOVERNANCE_INCIDENT_WEBHOOK_TOKEN || '' }}
          INCIDENT_ACTION: ${{ steps.incident_issue.outputs.incident_action }}
          INCIDENT_ISSUE_NUMBER: ${{ steps.incident_issue.outputs.issue_number }}
          INCIDENT_ISSUE_URL: ${{ steps.incident_issue.outputs.issue_url }}
          INCIDENT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          INCIDENT_WORKFLOW: ${{ github.workflow }}
          INCIDENT_REPOSITORY: ${{ github.repository }}
          INCIDENT_GOVERNANCE_PROFILE: ${{ steps.resolve_profile.outputs.resolved_governance_profile }}
          INCIDENT_POLICY_OUTCOME: ${{ steps.policy_check.outcome }}
          INCIDENT_API_DOCS_OUTCOME: ${{ steps.api_docs_check.outcome }}
        run: |
          if [[ -z "${GOVERNANCE_INCIDENT_WEBHOOK_URL}" ]]; then
            echo "No GOVERNANCE_INCIDENT_WEBHOOK_URL configured; skipping optional external notification."
            exit 0
          fi

          mkdir -p .tmp
          payload_file=".tmp/governance-incident-webhook-payload.json"
          cat > "${payload_file}" <<EOF
          {
            "event": "governance_audit_failure",
            "repository": "${INCIDENT_REPOSITORY}",
            "workflow": "${INCIDENT_WORKFLOW}",
            "run_url": "${INCIDENT_RUN_URL}",
            "issue_number": "${INCIDENT_ISSUE_NUMBER}",
            "issue_url": "${INCIDENT_ISSUE_URL}",
            "incident_action": "${INCIDENT_ACTION}",
            "governance_profile": "${INCIDENT_GOVERNANCE_PROFILE}",
            "policy_check_outcome": "${INCIDENT_POLICY_OUTCOME}",
            "api_docs_outcome": "${INCIDENT_API_DOCS_OUTCOME}",
            "timestamp_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          auth_header=()
          if [[ -n "${GOVERNANCE_INCIDENT_WEBHOOK_TOKEN}" ]]; then
            auth_header=(-H "Authorization: Bearer ${GOVERNANCE_INCIDENT_WEBHOOK_TOKEN}")
          fi

          curl --fail --silent --show-error \
            -X POST \
            -H "Content-Type: application/json" \
            "${auth_header[@]}" \
            --data-binary @"${payload_file}" \
            "${GOVERNANCE_INCIDENT_WEBHOOK_URL}"

          echo "External governance incident webhook notification delivered."
