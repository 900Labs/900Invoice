name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-22.04
    env:
      CARGO_TARGET_DIR: /tmp/900invoice-target
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify API docs parity
        run: ./scripts/verify-api-doc-commands.sh

      - name: Verify governance sprint checklist reference (PRs)
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          STRICT_SPRINT_DOC_REFERENCE: ${{ vars.STRICT_SPRINT_DOC_REFERENCE || '0' }}
        run: |
          mkdir -p .tmp
          git fetch --no-tags origin "${{ github.base_ref }}"
          REPORT_JSON_PATH=".tmp/ci-governance-diff-context.json" \
            ./scripts/verify-governance-sprint-checklist.sh "origin/${{ github.base_ref }}" "HEAD"

      - name: Validate governance trace JSON schema (PRs)
        if: github.event_name == 'pull_request'
        run: ./scripts/verify-governance-trace-json.sh .tmp/ci-governance-diff-context.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libappindicator3-dev

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-directories: /tmp/900invoice-target

      - name: Install npm dependencies
        run: npm install

      - name: Frontend type check
        run: npm run check

      - name: Cargo check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Cargo clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
